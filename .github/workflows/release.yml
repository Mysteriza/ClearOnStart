name: Auto Build and Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERSION: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-Increment Version
        id: version
        run: |
          CURRENT_VERSION=$(jq -r '.version' manifest.json)
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          jq --arg ver "$NEW_VERSION" '.version = $ver' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          echo "VERSION=v$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Version bumped: $CURRENT_VERSION -> $NEW_VERSION"

      - name: Commit Version Update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add manifest.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push

      - name: Create and Push Git Tag
        run: |
          git tag -a ${{ env.VERSION }} -m "Release ${{ env.VERSION }}"
          git push origin ${{ env.VERSION }}

      - name: Build Extension ZIP
        run: |
          mkdir -p dist
          zip -r dist/ClearOnStart.zip \
            background.js \
            manifest.json \
            README.md \
            icons/ \
            options/ \
            popup/ \
            styles/ \
            fonts/

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ env.VERSION }}$" | head -n 1)
          echo ""
          if [ -z "$PREV_TAG" ]; then
            echo "First release — collecting all commits."
            git log --pretty=format:"* %s (%h)" > changelog.txt
          else
            echo "Getting commits since $PREV_TAG"
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" > changelog.txt
          fi

          echo "# ClearOnStart ${{ env.VERSION }}" > release_body.txt
          echo "" >> release_body.txt
          echo "> Wipe browsing history, cached images, download records, and autofill form data the moment Chrome opens." >> release_body.txt
          echo "" >> release_body.txt
          echo "## Installation" >> release_body.txt
          echo "" >> release_body.txt
          echo "1. Download **ClearOnStart.zip** from the attachments below." >> release_body.txt
          echo "2. Extract the zip file anywhere on your computer." >> release_body.txt
          echo "3. Open Chrome and go to \`chrome://extensions\`." >> release_body.txt
          echo "4. Enable **Developer mode** (top-right toggle)." >> release_body.txt
          echo "5. Click **Load unpacked** and select the extracted folder." >> release_body.txt
          echo "6. Pin ClearOnStart to the toolbar (optional)." >> release_body.txt
          echo "" >> release_body.txt
          echo "---" >> release_body.txt
          echo "" >> release_body.txt
          echo "## Changelog" >> release_body.txt
          echo "" >> release_body.txt
          cat changelog.txt >> release_body.txt

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ClearOnStart ${{ env.VERSION }}
          body_path: release_body.txt
          files: dist/ClearOnStart.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
